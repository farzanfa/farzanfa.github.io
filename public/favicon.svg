<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded dark tile, matches the site theme -->
  <rect width="200" height="200" rx="44" fill="#0B0B0E"/>

  <!-- Subtle inner stroke for depth -->
  <rect x="0.75" y="0.75" width="198.5" height="198.5" rx="43.25" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- "FA" monogram, centered -->
  <text
    x="100"
    y="106"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
    font-size="120"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-6">FA</text>

  <!-- Amber accent dot — AWS UG Trivandrum signal -->
  <circle cx="170" cy="32" r="9" fill="#FF9900"/>
  <circle cx="170" cy="32" r="9" fill="#FF9900" opacity="0.4">
    <animate attributeName="r" values="9;14;9" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
